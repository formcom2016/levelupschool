<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduVerse · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   EDUVERSE CE1 — Style principal
   Thème : univers spatial violet/cyan, îles flottantes
   Palette dérivée de la maquette + base Form'Com
   ═══════════════════════════════════════════════════════════ */
:root{
  --bg:#050816;
  --bg2:#0A0F2E;
  --card:#0E1730;
  --card-glass:rgba(14,23,48,.78);
  --border:rgba(148,163,255,.14);
  --text:#F0F4FF;
  --muted:#8A93B2;
  --violet:#8B5CF6;
  --violet2:#A78BFA;
  --cyan:#22D3EE;
  --blue:#2979FF;
  --gold:#F5C518;
  --gold2:#F5A623;
  --green:#22C55E;
  --red:#FF4D6D;
  --r:16px;
  --rs:10px;
  --shadow:0 10px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
button{font-family:inherit;color:inherit}
:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}

/* ── FOND SPATIAL ─────────────────────────────── */
.space-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(139,92,246,.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 15% 90%, rgba(34,211,238,.10) 0%, transparent 60%),
    radial-gradient(ellipse 45% 40% at 88% 75%, rgba(41,121,255,.12) 0%, transparent 60%),
    var(--bg);
}
.star{position:absolute;border-radius:50%;background:#fff;opacity:.7;animation:twinkle 3.4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.85}}
.planet{position:absolute;top:60px;right:-60px;width:190px;height:190px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%, #6D5BD0 0%, #3B2E8C 45%, #131048 80%);
  box-shadow:inset -22px -18px 50px rgba(0,0,0,.55), 0 0 70px rgba(139,92,246,.35);
  opacity:.85}
.planet::after{content:'';position:absolute;inset:-16px;border-radius:50%;
  border:2px solid rgba(167,139,250,.22);transform:rotate(-18deg) scaleY(.42)}

/* ── STRUCTURE APP ────────────────────────────── */
#app{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:0 14px 96px}
.screen{display:none;animation:fadeUp .35s ease both}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── HEADER JOUEUR ────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 4px 10px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;line-height:1}
.brand-name{font-family:'Exo 2',sans-serif;font-weight:900;font-size:22px;letter-spacing:.5px}
.brand-name .edu{color:var(--cyan)}
.brand-name .verse{color:var(--text)}
.brand-tag{font-family:'Exo 2',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:2.6px;
  text-transform:uppercase;color:var(--muted);margin-top:4px}
.player-chip{display:flex;align-items:center;gap:10px;background:var(--card-glass);
  border:1px solid var(--border);border-radius:99px;padding:6px 14px 6px 6px;backdrop-filter:blur(8px)}
.avatar-bubble{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:21px;background:radial-gradient(circle at 35% 30%, #2B2564, #171243);
  border:2px solid var(--violet);box-shadow:0 0 14px rgba(139,92,246,.5)}
.player-meta{line-height:1.15}
.player-name{font-family:'Exo 2',sans-serif;font-weight:800;font-size:14px}
.player-level{font-size:10.5px;color:var(--muted);font-weight:600}

.statbar{display:flex;gap:8px;flex-wrap:wrap;margin:2px 4px 14px}
.stat-pill{display:flex;align-items:center;gap:7px;background:var(--card-glass);border:1px solid var(--border);
  border-radius:99px;padding:7px 13px;font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;backdrop-filter:blur(8px)}
.stat-pill .ico{font-size:15px}
.stat-pill .lbl{font-family:'Inter',sans-serif;font-weight:600;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.stat-xp{color:var(--gold)}
.stat-coins{color:var(--gold2)}
.stat-lives{color:var(--red)}
.xp-track{flex:1 1 150px;min-width:140px;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:6px 13px;
  background:var(--card-glass);border:1px solid var(--border);border-radius:99px}
.xp-track-top{display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--muted);
  font-family:'Exo 2',sans-serif;letter-spacing:.5px}
.xp-track-top b{color:var(--gold)}
.bar{height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold2),var(--gold));
  box-shadow:0 0 10px rgba(245,197,24,.55);transition:width .6s cubic-bezier(.22,1,.36,1)}

.btn-recharge{border:1px dashed rgba(255,77,109,.4);background:rgba(255,77,109,.08);color:var(--red);
  border-radius:99px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer}

/* ── TITRE BANNIÈRE ───────────────────────────── */
.hero-banner{text-align:center;margin:6px auto 22px;max-width:560px;
  border:1px solid rgba(34,211,238,.28);border-radius:14px;padding:14px 18px;
  background:linear-gradient(180deg, rgba(34,211,238,.08), rgba(139,92,246,.06));
  box-shadow:0 0 30px rgba(34,211,238,.08) inset}
.hero-banner h1{font-family:'Exo 2',sans-serif;font-weight:900;font-size:clamp(17px,4vw,24px);
  letter-spacing:1.5px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--cyan),var(--violet2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-banner p{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}

/* ── CARTE DE L'UNIVERS ───────────────────────── */
.universe{position:relative;margin:0 auto 10px;max-width:980px}
.paths-svg{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.paths-svg path{fill:none;stroke:url(#pathGrad);stroke-width:2.5;stroke-dasharray:3 9;stroke-linecap:round;
  animation:flow 2.6s linear infinite;opacity:.75}
@keyframes flow{to{stroke-dashoffset:-48}}
.islands{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:6px 0 2px}
.island{position:relative;border-radius:var(--r);padding:16px 14px 14px;text-align:center;cursor:pointer;
  border:1px solid var(--border);background:linear-gradient(165deg, rgba(31,27,77,.9), rgba(11,16,42,.92));
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s;
  animation:floaty 5s ease-in-out infinite}
.island:nth-child(2n){animation-delay:-1.6s}
.island:nth-child(3n){animation-delay:-3.1s}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.island.unlocked{border-color:rgba(139,92,246,.55);box-shadow:0 0 26px rgba(139,92,246,.22), var(--shadow)}
.island.unlocked:hover{transform:translateY(-8px) scale(1.02);border-color:var(--cyan);
  box-shadow:0 0 34px rgba(34,211,238,.3), var(--shadow)}
.island.locked{opacity:.62;cursor:default;filter:saturate(.55)}
.island-art{height:58px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:8px}
.island-art svg{width:96px;height:56px;overflow:visible}
.island-name{font-family:'Exo 2',sans-serif;font-weight:900;font-size:13.5px;letter-spacing:1.2px;text-transform:uppercase}
.island-sub{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:7px;
  font-size:10.5px;font-weight:700;color:var(--muted)}
.island-sub .mini-bar{width:56px;height:6px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.island-sub .mini-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#86EFAC)}
.lock-badge{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:8px;
  background:rgba(0,0,0,.45);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px}
.island-cta{margin-top:10px;font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--cyan)}

/* Défi quotidien (balise centrale) */
.daily-card{grid-column:2;position:relative;text-align:center;border-radius:var(--r);padding:18px 14px 16px;
  border:1px solid rgba(245,197,24,.4);cursor:pointer;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(245,197,24,.16), transparent 65%),
    linear-gradient(165deg, rgba(46,33,10,.55), rgba(11,16,42,.95));
  box-shadow:0 0 34px rgba(245,197,24,.16), var(--shadow);
  animation:floaty 5s ease-in-out infinite;animation-delay:-.8s}
.daily-flame{font-size:30px;filter:drop-shadow(0 0 12px rgba(245,197,24,.7));animation:pulseGlow 1.8s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.daily-title{font-family:'Exo 2',sans-serif;font-weight:900;font-size:13.5px;letter-spacing:1.4px;text-transform:uppercase;margin-top:6px}
.daily-xp{font-size:11px;font-weight:800;color:var(--gold);margin-top:3px;font-family:'Exo 2',sans-serif}
.daily-done{font-size:10.5px;font-weight:700;color:var(--green);margin-top:8px}

/* ── BOUTONS ──────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
  border-radius:12px;font-family:'Exo 2',sans-serif;font-weight:900;letter-spacing:1px;text-transform:uppercase;
  transition:transform .12s ease, filter .2s;text-decoration:none}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,#FFD84D,var(--gold2));color:#241A00;padding:12px 26px;font-size:13px;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
  box-shadow:0 0 26px rgba(245,197,24,.45)}
.btn-gold:hover{filter:brightness(1.08)}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);padding:11px 20px;font-size:12px}
.btn-cyan{background:rgba(34,211,238,.13);border:1px solid rgba(34,211,238,.45);color:var(--cyan);padding:11px 20px;font-size:12px}
.btn-block{width:100%}
.btn[disabled]{opacity:.45;cursor:not-allowed;filter:saturate(.4)}

/* ── ÉCRAN LOGIN ──────────────────────────────── */
.login-wrap{max-width:430px;margin:6vh auto 0;text-align:center}
.login-logo{font-family:'Exo 2',sans-serif;font-weight:900;font-size:38px;letter-spacing:1px}
.login-logo .edu{color:var(--cyan);text-shadow:0 0 24px rgba(34,211,238,.6)}
.login-tag{font-family:'Exo 2',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);margin:6px 0 26px}
.login-card{background:var(--card-glass);border:1px solid var(--border);border-radius:20px;padding:24px 20px;
  backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.login-label{font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);
  text-align:left;margin:0 0 8px;font-family:'Exo 2',sans-serif}
.login-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);
  background:rgba(5,8,22,.7);color:var(--text);font-size:16px;font-weight:700;font-family:'Exo 2',sans-serif;
  letter-spacing:.5px;margin-bottom:18px}
.login-input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.15)}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:20px}
.avatar-opt{aspect-ratio:1;border-radius:14px;border:2px solid var(--border);background:rgba(255,255,255,.04);
  font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.avatar-opt:hover{border-color:var(--violet2);transform:scale(1.06)}
.avatar-opt.sel{border-color:var(--cyan);background:rgba(34,211,238,.12);box-shadow:0 0 16px rgba(34,211,238,.35);transform:scale(1.08)}
.login-note{font-size:10.5px;color:var(--muted);margin-top:14px;line-height:1.6}

/* ── ÉCRAN MONDE (compétences) ────────────────── */
.back-row{display:flex;align-items:center;gap:12px;margin:4px 0 16px}
.btn-back{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:9px 14px;
  font-size:12px;font-weight:800;cursor:pointer;font-family:'Exo 2',sans-serif;letter-spacing:.5px}
.screen-title{font-family:'Exo 2',sans-serif;font-weight:900;font-size:17px;letter-spacing:1.4px;text-transform:uppercase}
.screen-sub{font-size:11.5px;color:var(--muted);font-weight:600}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.comp-card{background:var(--card-glass);border:1px solid var(--border);border-radius:var(--r);padding:16px;backdrop-filter:blur(8px)}
.comp-head{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.comp-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;
  background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.3)}
.comp-name{font-family:'Exo 2',sans-serif;font-weight:900;font-size:14px}
.comp-pct{font-size:11px;font-weight:800;color:var(--green);font-family:'Exo 2',sans-serif}
.comp-bar{margin-bottom:12px}
.niv-row{display:flex;gap:8px}
.niv-btn{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--border);cursor:pointer;
  background:rgba(255,255,255,.045);font-family:'Exo 2',sans-serif;font-weight:800;font-size:11px;
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.niv-btn:hover:not([disabled]){border-color:var(--cyan);background:rgba(34,211,238,.1)}
.niv-btn[disabled]{opacity:.45;cursor:not-allowed}
.niv-stars{font-size:9px;letter-spacing:1px;color:var(--gold)}
.niv-stars .off{opacity:.25}

/* ── ÉCRAN MISSION ────────────────────────────── */
.mission-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 14px;flex-wrap:wrap}
.mission-tag{font-family:'Exo 2',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;
  border:1px solid rgba(34,211,238,.4);color:var(--cyan);border-radius:10px;padding:8px 14px;background:rgba(34,211,238,.07)}
.lives-row{display:flex;gap:4px;font-size:16px;filter:drop-shadow(0 0 6px rgba(255,77,109,.6))}
.lives-row .lost{opacity:.22;filter:grayscale(1)}
.mission-progress{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.mission-progress .qcount{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap;letter-spacing:.6px}
.mission-progress .bar{flex:1}
.mission-progress .bar > i{background:linear-gradient(90deg,var(--cyan),var(--violet));box-shadow:0 0 10px rgba(34,211,238,.5)}

.mission-layout{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:start}
.q-card{background:var(--card-glass);border:1px solid var(--border);border-radius:20px;padding:24px 22px;
  backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.q-text{font-family:'Exo 2',sans-serif;font-weight:800;font-size:clamp(19px,3.4vw,25px);line-height:1.35;margin-bottom:6px}
.q-visual{margin:14px 0 4px;display:flex;justify-content:center}
.q-visual svg{width:120px;height:120px;filter:drop-shadow(0 0 14px rgba(34,211,238,.35))}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.ans-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:13px;cursor:pointer;
  border:1.5px solid var(--border);background:rgba(5,8,22,.55);font-size:18px;font-weight:800;
  font-family:'Exo 2',sans-serif;transition:.15s;text-align:left}
.ans-btn:hover:not([disabled]){border-color:var(--cyan);background:rgba(34,211,238,.08);transform:translateY(-2px)}
.ans-letter{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:13px;background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.4);color:var(--violet2);flex-shrink:0}
.ans-btn.correct{border-color:var(--green);background:rgba(34,197,94,.16);box-shadow:0 0 18px rgba(34,197,94,.35)}
.ans-btn.correct .ans-letter{background:var(--green);border-color:var(--green);color:#03210F}
.ans-btn.wrong{border-color:var(--red);background:rgba(255,77,109,.13);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.ans-btn[disabled]{cursor:default}

.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.timer-svg{width:88px;height:88px;transform:rotate(-90deg)}
.timer-svg .track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:7}
.timer-svg .prog{fill:none;stroke:var(--cyan);stroke-width:7;stroke-linecap:round;
  filter:drop-shadow(0 0 6px rgba(34,211,238,.7));transition:stroke-dashoffset 1s linear, stroke .3s}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Exo 2',sans-serif;font-weight:900;font-size:24px;transform:rotate(0)}
.timer-box{position:relative;width:88px;height:88px}
.timer-lbl{font-size:9.5px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'Exo 2',sans-serif}

.feedback{margin-top:16px;border-radius:13px;padding:13px 16px;font-family:'Exo 2',sans-serif;font-weight:800;
  font-size:14.5px;display:none;align-items:center;gap:10px;border:1.5px solid}
.feedback.show{display:flex;animation:fadeUp .25s ease both}
.feedback.good{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#7CF5AE}
.feedback.bad{border-color:rgba(255,77,109,.5);background:rgba(255,77,109,.09);color:#FF9EB2}
.feedback .fxp{margin-left:auto;color:var(--gold);white-space:nowrap}

/* ── ÉCRAN RÉSULTAT ───────────────────────────── */
.result-wrap{max-width:520px;margin:4vh auto 0;text-align:center}
.result-title{font-family:'Exo 2',sans-serif;font-weight:900;font-size:clamp(24px,5vw,32px);letter-spacing:2px;
  text-transform:uppercase;color:var(--cyan);text-shadow:0 0 30px rgba(34,211,238,.5)}
.medal{position:relative;width:150px;height:150px;margin:26px auto 10px;display:flex;align-items:center;justify-content:center}
.medal .hex{position:absolute;inset:0;background:linear-gradient(160deg,var(--violet),#5B21B6);
  clip-path:polygon(50% 0,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  box-shadow:0 0 50px rgba(139,92,246,.65);animation:pulseGlow 2.4s ease-in-out infinite}
.medal .hex::before{content:'';position:absolute;inset:7px;background:linear-gradient(160deg,#2E1065,#171243);
  clip-path:polygon(50% 0,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%)}
.medal-stars{position:relative;z-index:1;font-size:30px;letter-spacing:2px;filter:drop-shadow(0 0 10px rgba(245,197,24,.8))}
.medal-stars .off{opacity:.25;filter:grayscale(1)}
.result-msg{font-family:'Exo 2',sans-serif;font-weight:900;font-size:18px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);margin:14px 0 4px}
.result-score{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:20px}
.reward-row{display:flex;gap:10px;justify-content:center;margin-bottom:26px;flex-wrap:wrap}
.reward-card{background:var(--card-glass);border:1px solid var(--border);border-radius:14px;padding:12px 20px;min-width:104px}
.reward-lbl{font-size:9.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);font-family:'Exo 2',sans-serif}
.reward-val{font-family:'Exo 2',sans-serif;font-weight:900;font-size:21px;margin-top:4px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.badge-toast{margin:0 auto 20px;max-width:340px;border:1px solid rgba(245,197,24,.45);border-radius:13px;

<body>
<div class="space-bg" id="spaceBg"><div class="planet"></div></div>

<div class="dash-wrap">

  <!-- Connexion admin -->
  <div id="dashLogin" class="login-wrap" style="margin-top:8vh">
    <div class="login-logo"><span class="edu">EDU</span>VERSE</div>
    <div class="login-tag">Dashboard Parent · Enseignant</div>
    <div class="login-card">
      <p class="login-label">Code administrateur</p>
      <input class="login-input" id="adminCode" type="password" placeholder="Ton code admin" autocomplete="off">
      <button class="btn btn-gold btn-block" id="btnDashLogin">🔓 Ouvrir le dashboard</button>
      <p class="login-note" id="dashLoginNote">Le code admin est défini dans le script Google (ADMIN_CODE).</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashMain" style="display:none">
    <div class="dash-head">
      <div class="brand">
        <div class="brand-name"><span class="edu">EDU</span><span class="verse">VERSE</span></div>
        <div class="brand-tag">Dashboard · Suivi des explorateurs</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-cyan" id="btnRefresh">🔄 Actualiser</button>
        <button class="btn btn-ghost" id="btnDashLogout">Quitter</button>
      </div>
    </div>

      <div class="panel-title">➕ Ajouter un explorateur</div>

        <div><label>Prénom</label><input id="newPrenom" maxlength="14" placeholder="Ex : Léa"></div>
        <div><label>Classe</label>
          <select id="newClasse">
            <option value="gs">Grande Section</option>
            <option value="ce1" selected>CE1</option>
            <option value="cm2">CM2</option>
            <option value="sixieme">6e</option>
            <option value="quatrieme">4e</option>
            <option value="seconde">Seconde</option>
          </select>
        </div>
        <button class="btn btn-gold" id="btnAddEleve">Créer</button>
      </div>
      <div class="new-eleve" id="newEleveBox"></div>

    <div class="panel">
      <div class="panel-title">📋 Activité récente</div>
      <table class="act-table" id="actTable"></table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══ CONFIGURATION — à remplir ═══════════════════════════
var APPS_URL = 'https://script.google.com/macros/s/AKfycbxOKt6IzzJC_D3euoku1t4T1qtp-5Un6q18FB72wP8QPHl-M37k6APY-h-_JcTKKhKB/exec';   // ← URL /exec du script Google (la même que dans app.js)
var APP_URL  = 'https://formcom2016.github.io/levelupschool/';   // ← URL de ton app, ex : https://tonpseudo.github.io/eduverse/
// ═════════════════════════════════════════════════════════

var CLASSE_LABELS = { gs:'Grande Section', ce1:'CE1', cm2:'CM2', sixieme:'6e', quatrieme:'4e', seconde:'Seconde' };
var COMP_LABELS = {
  compter:'Compter', petitscalculs:'Petits calculs', comparer:'Plus ou moins', suites:'Avant/après', formes:'Formes', couleurs:'Couleurs',
  addition:'Addition', soustraction:'Soustraction', multiplication:'Multiplication', doubles:'Doubles/moitiés', problemes:'Problèmes', geometrie:'Géométrie',
  grandsnombres:'Grands nombres', division:'Division', fractions:'Fractions', decimaux:'Décimaux', mesures:'Mesures',
  proportionnalite:'Proportionnalité', perimetres:'Périmètres/aires', divisibilite:'Divisibilité', calculmental:'Calcul mental',
  relatifs:'Relatifs', puissances:'Puissances', litteral:'Calcul littéral', pythagore:'Pythagore', pourcentages:'Pourcentages',
  numerique:'Calcul numérique', algebrique:'Dév./factoriser', equations:'Équations', fonctions:'Fonctions', inequations:'Inéquations',
  fr1:'Français · 1', fr2:'Français · 2', fr3:'Français · 3',
  ar1:'Arabe · lettres', ar2:'Arabe · mots', ar3:'Arabe · nombres',
  hi1:'Histoire · 1', hi2:'Histoire · 2', hi3:'Histoire · 3',
  sc1:'Sciences · 1', sc2:'Sciences · 2', sc3:'Sciences · 3',
  is1:'Religion · Sîra', is2:'Religion · piliers/Coran', is3:'Religion · Fiqh',
  is4:'Religion · Juz\u2019 Amma', is5:'Religion · Tawhid',
  ar4:'Arabe · formes', ar5:'Arabe · voyelles', ar6:'Arabe · lecture'
};

var admin = '';
function $(id){ return document.getElementById(id); }
function toast(msg){
  var t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
function api(params){
  var p = new URLSearchParams(params);
  return fetch(APPS_URL + '?' + p.toString())
    .then(function(r){ return r.json(); });
}
function todayStr(){ return new Date().toISOString().slice(0, 10); }

// Fond étoilé
(function(){
  var bg = $('spaceBg');
  for(var i = 0; i < 70; i++){
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 2.2 + .6;
    s.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random() * 100) + '%;top:'
      + (Math.random() * 100) + '%;animation-delay:' + (Math.random() * 3.4) + 's';
    bg.appendChild(s);
  }
})();

// Connexion
$('btnDashLogin').onclick = function(){
  if(!APPS_URL){ $('dashLoginNote').textContent = '⚠️ APPS_URL n\u2019est pas configurée dans dashboard.html'; return; }
  var code = $('adminCode').value.trim();
  if(!code){ toast('Entre ton code admin'); return; }
  var btn = $('btnDashLogin');
  btn.disabled = true; btn.textContent = 'Connexion…';
  api({ action: 'dashboard', admin: code }).then(function(res){
    btn.disabled = false; btn.textContent = '🔓 Ouvrir le dashboard';
    if(res.status !== 'ok'){ toast(res.message || 'Code incorrect'); return; }
    admin = code;
    try { sessionStorage.setItem('eduverse_admin', code); } catch(e){}
    $('dashLogin').style.display = 'none';
    $('dashMain').style.display = 'block';
    paint(res);
  }).catch(function(){
    btn.disabled = false; btn.textContent = '🔓 Ouvrir le dashboard';
    toast('Connexion impossible — vérifie APPS_URL et ta connexion');
  });
};
$('adminCode').addEventListener('keydown', function(e){ if(e.key === 'Enter') $('btnDashLogin').click(); });

$('btnRefresh').onclick = load;
$('btnDashLogout').onclick = function(){
  admin = '';
  try { sessionStorage.removeItem('eduverse_admin'); } catch(e){}
  $('dashMain').style.display = 'none';
  $('dashLogin').style.display = 'block';
};

function load(){
  api({ action: 'dashboard', admin: admin }).then(function(res){
    if(res.status === 'ok') paint(res);
    else toast(res.message || 'Erreur');
  }).catch(function(){ toast('Actualisation impossible'); });
}

function paint(res){
  // Cartes enfants
  var kids = res.eleves.slice().sort(function(a, b){ return b.xp - a.xp; });
  $('kidsGrid').innerHTML = kids.map(function(k){
    var comps = {};
    try { comps = JSON.parse(k.comps || '{}'); } catch(e){}

    // Compatible avec les deux formats : [3,2,0] (app actuelle) ou {etoiles:[3,2,0]}
    function pctDe(v){
      var e = Array.isArray(v) ? v : ((v && v.etoiles) || [0, 0, 0]);
      return Math.round(((e[0] || 0) + (e[1] || 0) + (e[2] || 0)) / 9 * 100);
    }
    function colDe(p){ return p >= 70 ? '#22C55E' : p >= 40 ? '#F5C518' : '#FF7849'; }
    function mondeDe(key){
      var m = key.match(/^(fr|ar|hi|sc|is)[0-9]$/);
      return m ? m[1] : 'maths';
    }

    var parMonde = {};
    Object.keys(comps).forEach(function(key){
      var mo = mondeDe(key);
      (parMonde[mo] = parMonde[mo] || []).push(key);
    });

    var MONDES = [
      ['maths', '🧮 Mathématiques'], ['fr', '📚 Français'], ['ar', '🕌 Arabe'],
      ['is', '☪️ Sc. religieuses'], ['sc', '🔬 Sciences'], ['hi', '🏛️ Histoire']
    ];

    var skills = MONDES.filter(function(m){ return parMonde[m[0]]; }).map(function(m){
      var keys = parMonde[m[0]];
      var moy = Math.round(keys.reduce(function(s, key){ return s + pctDe(comps[key]); }, 0) / keys.length);
      var cm = colDe(moy);
      var ligne = '<div class="kid-skill" style="margin-top:8px"><span class="sn" style="color:var(--txt);font-weight:800">' + m[1] + '</span>'
        + '<span class="bar"><i style="width:' + moy + '%;background:' + cm + '"></i></span>'
        + '<span class="sp" style="color:' + cm + '">' + moy + '%</span></div>';
      // Détail : uniquement les compétences commencées, pour garder la carte lisible
      var detail = keys.filter(function(key){ return pctDe(comps[key]) > 0; }).map(function(key){
        var p = pctDe(comps[key]);
        var col = colDe(p);
        return '<div class="kid-skill" style="padding-left:12px;opacity:.85"><span class="sn">' + (COMP_LABELS[key] || key) + '</span>'
          + '<span class="bar"><i style="width:' + p + '%;background:' + col + '"></i></span>'
          + '<span class="sp" style="color:' + col + '">' + p + '%</span></div>';
      }).join('');
      return ligne + detail;
    }).join('') || '<div class="kid-skill"><span class="sn" style="width:auto">Aucune mission jouée pour l\u2019instant</span></div>';

    var defiFait = k.dailyDone === todayStr();
    var lien = (APP_URL || './') + '?id=' + encodeURIComponent(k.id);
    return '<div class="kid-card">'
      + '<div class="kid-top"><div class="avatar-bubble">' + (k.avatar || '🙂') + '</div>'
      + '<div class="kid-meta"><div class="kid-name">' + k.prenom + '</div>'
      + '<div class="kid-classe">' + (CLASSE_LABELS[k.classe] || k.classe) + ' · Code ' + k.id + ' · PIN ' + k.pin + '</div></div>'
      + '<div class="kid-defi" title="Défi quotidien">' + (defiFait ? '⚡✅' : '⚡▫️') + '</div></div>'
      + '<div class="kid-stats">'
      + '<div class="kid-stat"><b>' + k.xp.toLocaleString('fr-FR') + '</b><span>XP</span></div>'
      + '<div class="kid-stat"><b>' + k.missions + '</b><span>missions</span></div>'
      + '<div class="kid-stat"><b>' + k.pieces + '</b><span>pièces</span></div>'
      + '</div>'
      + skills
      + '<div class="kid-foot"><span>Dernière activité : ' + (k.derniereActivite || '—') + '</span>'
      + '<button class="kid-link" data-lien="' + lien + '" data-prenom="' + k.prenom + '" data-pin="' + k.pin + '">📤 Envoyer son lien</button></div>'
      + '</div>';
  }).join('') || '<div class="panel">Aucun explorateur pour l\u2019instant — crée le premier ci-dessous ! 👇</div>';

  document.querySelectorAll('.kid-link').forEach(function(b){
    b.onclick = function(){
      var msg = '🚀 ' + b.getAttribute('data-prenom') + ', voici ton lien EduVerse :\n'
        + b.getAttribute('data-lien') + '\nTon PIN secret : ' + b.getAttribute('data-pin') + '\nBonne mission ! ⭐';
      if(navigator.share){ navigator.share({ title: 'EduVerse', text: msg }).catch(function(){}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(msg).then(function(){ toast('Lien copié !'); }); }
      else { prompt('Copie ce message :', msg); }
    };
  });

  // Activité
  $('actTable').innerHTML = (res.activites || []).map(function(a){
    return '<tr><td>' + a.date + '</td><td><b>' + a.prenom + '</b></td><td>' + (a.detail || a.type) + '</td>'
      + '<td class="act-xp">' + (a.xp ? '+' + a.xp + ' XP' : '') + '</td></tr>';
  }).join('') || '<tr><td>Aucune activité pour l\u2019instant</td></tr>';
}

// Ajout d'élève
$('btnAddEleve').onclick = function(){
  var prenom = $('newPrenom').value.trim();
  if(!prenom){ toast('Entre un prénom'); return; }
  var btn = $('btnAddEleve');
  btn.disabled = true; btn.textContent = 'Création…';
  api({ action: 'addEleve', admin: admin, prenom: prenom, classe: $('newClasse').value }).then(function(res){
    btn.disabled = false; btn.textContent = 'Créer';
    if(res.status !== 'ok'){ toast(res.message || 'Erreur'); return; }
    var lien = (APP_URL || './') + '?id=' + encodeURIComponent(res.id);
    var box = $('newEleveBox');
    box.className = 'new-eleve show';
    box.innerHTML = '🎉 <b>' + res.prenom + '</b> est prêt à explorer !<br><br>'
      + 'Code : <code>' + res.id + '</code> · PIN : <code>' + res.pin + '</code><br><br>'
      + 'Son lien : <code style="font-size:11px">' + lien + '</code><br><br>'
      + '<button class="kid-link" data-lien="' + lien + '" data-prenom="' + res.prenom + '" data-pin="' + res.pin + '">📤 Envoyer son lien</button>';
    box.querySelector('.kid-link').onclick = function(){
      var msg = '🚀 ' + res.prenom + ', voici ton lien EduVerse :\n' + lien + '\nTon PIN secret : ' + res.pin + '\nBonne mission ! ⭐';
      if(navigator.share){ navigator.share({ title: 'EduVerse', text: msg }).catch(function(){}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(msg).then(function(){ toast('Lien copié !'); }); }
      else { prompt('Copie ce message :', msg); }
    };
    $('newPrenom').value = '';
    load();
  }).catch(function(){
    btn.disabled = false; btn.textContent = 'Créer';
    toast('Création impossible');
  });
};

// Reconnexion auto (session du navigateur)
(function(){
  try {
    var saved = sessionStorage.getItem('eduverse_admin');
    if(saved && APPS_URL){
      $('adminCode').value = saved;
      $('btnDashLogin').click();
    }
  } catch(e){}
})();
</script>
</body>
